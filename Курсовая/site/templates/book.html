<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись к врачу</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
        }
        .container { max-width: 600px; margin: 50px auto; padding: 0 20px; }
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover { background: #5a67d8; }
        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .back-link { margin-top: 20px; text-align: center; }
        .back-link a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🏥 Платная поликлиника</h1>
        <a href="/logout" class="logout-btn">Выйти</a>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>📝 Запись к врачу</h2>
            
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            
            <form method="POST">
                <div class="form-group">
                    <label>Выберите врача</label>
                    <select name="doctor_id" required>
                        <option value="">-- Выберите врача --</option>
                        {% for d in doctors %}
                        <option value="{{ d.id }}">{{ d.full_name }} - {{ d.specialization }} ({{ d.consultation_price }} ₽)</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Дата</label>
                    <input type="date" name="appointment_date" required min="{{ now }}">
                </div>
                
                <div class="form-group">
                    <label>Время</label>
                    <select name="appointment_time" required>
                        <option value="">-- Выберите время --</option>
                        <option value="09:00">09:00</option>
                        <option value="10:00">10:00</option>
                        <option value="11:00">11:00</option>
                        <option value="12:00">12:00</option>
                        <option value="13:00">13:00</option>
                        <option value="14:00">14:00</option>
                        <option value="15:00">15:00</option>
                        <option value="16:00">16:00</option>
                        <option value="17:00">17:00</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">Записаться</button>
            </form>
            
            <div class="back-link">
                <a href="/dashboard">← Назад</a>
            </div>
        </div>
    </div>
    
    <script>
        // Устанавливаем минимальную дату - сегодня
        const today = new Date().toISOString().split('T')[0];
        document.querySelector('input[type="date"]').min = today;
    </script>
</body>
</html>
