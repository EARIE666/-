<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            width: 100%;
            padding: 12px;
            padding-right: 45px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .password-wrapper input:focus { outline: none; border-color: #667eea; }
        .toggle-password {
            position: absolute;
            right: 12px;
            cursor: pointer;
            font-size: 20px;
            background: none;
            border: none;
            padding: 0;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: #5a67d8; }
        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        .links a { color: #667eea; text-decoration: none; }
        .password-strength {
            margin-top: 5px;
            font-size: 12px;
        }
        .strength-weak { color: #e53e3e; }
        .strength-medium { color: #ed8936; }
        .strength-strong { color: #48bb78; }
        .match-success { color: #48bb78; font-size: 12px; margin-top: 5px; }
        .match-error { color: #e53e3e; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Регистрация пациента</h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" id="registerForm">
            <div class="form-group">
                <label>ФИО *</label>
                <input type="text" name="full_name" required placeholder="Иванов Иван Иванович" value="{{ request.form.get('full_name', '') }}">
            </div>
            <div class="form-group">
                <label>Телефон *</label>
                <input type="tel" name="phone" required placeholder="+7 999 123-45-67" value="{{ request.form.get('phone', '') }}">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required placeholder="example@mail.ru" value="{{ request.form.get('email', '') }}">
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" required placeholder="минимум 3 символа">
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
                </div>
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            <div class="form-group">
                <label>Повторите пароль *</label>
                <div class="password-wrapper">
                    <input type="password" name="confirm_password" id="confirm_password" required placeholder="повторите пароль">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">👁️</button>
                </div>
                <div id="passwordMatch" class="match-error"></div>
            </div>
            <button type="submit" class="btn" id="submitBtn">Зарегистрироваться</button>
        </form>
        
        <div class="links">
            <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
        </div>
    </div>
    
    <script>
        // Переключение видимости пароля
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.type === 'password' ? 'text' : 'password';
            field.type = type;
        }
        
        // Проверка сложности пароля
        function checkPasswordStrength(password) {
            if (!password) return '';
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            if (strength <= 1) return { text: 'Слабый', class: 'strength-weak' };
            if (strength <= 3) return { text: 'Средний', class: 'strength-medium' };
            return { text: 'Сильный', class: 'strength-strong' };
        }
        
        // Проверка совпадения паролей
        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const matchDiv = document.getElementById('passwordMatch');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!password && !confirm) {
                matchDiv.innerHTML = '';
                matchDiv.className = 'match-error';
                submitBtn.disabled = false;
                return;
            }
            
            if (confirm.length === 0) {
                matchDiv.innerHTML = '';
                matchDiv.className = 'match-error';
                submitBtn.disabled = false;
                return;
            }
            
            if (password === confirm) {
                matchDiv.innerHTML = '✓ Пароли совпадают';
                matchDiv.className = 'match-success';
                submitBtn.disabled = false;
            } else {
                matchDiv.innerHTML = '✗ Пароли не совпадают';
                matchDiv.className = 'match-error';
                submitBtn.disabled = true;
            }
        }
        
        // События для проверки пароля
        const passwordField = document.getElementById('password');
        const confirmField = document.getElementById('confirm_password');
        
        passwordField.addEventListener('input', function() {
            const strength = checkPasswordStrength(this.value);
            const strengthDiv = document.getElementById('passwordStrength');
            if (this.value) {
                strengthDiv.innerHTML = `<span class="${strength.class}">🔒 ${strength.text} пароль</span>`;
            } else {
                strengthDiv.innerHTML = '';
            }
            checkPasswordMatch();
        });
        
        confirmField.addEventListener('input', checkPasswordMatch);
        
        // Валидация перед отправкой
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = passwordField.value;
            const confirm = confirmField.value;
            
            if (password !== confirm) {
                e.preventDefault();
                document.getElementById('passwordMatch').innerHTML = '✗ Пароли не совпадают';
                document.getElementById('passwordMatch').className = 'match-error';
                return false;
            }
            
            if (password.length < 3) {
                e.preventDefault();
                alert('Пароль должен быть не менее 3 символов');
                return false;
            }
            
            return true;
        });
    </script>
</body>
</html>
